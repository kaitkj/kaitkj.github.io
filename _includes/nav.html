<nav class="site-nav" id="site-nav">
  <a class="site-nav__brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
  <ul class="site-nav__links">
    {% for item in site.data.navigation %}
      {% assign current = false %}
      {% if page.url == item.url %}
        {% assign current = true %}
      {% endif %}
      <li>
        <a href="{{ item.url | relative_url }}"
           class="{% if current %}is-active{% endif %}">
          {{ item.title }}
        </a>
      </li>
    {% endfor %}
  </ul>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" type="button">
    <span class="theme-toggle__mode">MODE:</span>
    <span class="theme-toggle__value" id="theme-toggle-value">—</span>
  </button>
</nav>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    var valueEl = document.getElementById('theme-toggle-value');
    var root = document.documentElement;

    function reflect() {
      var current = root.getAttribute('data-theme') || 'light';
      valueEl.textContent = current.toUpperCase();
    }
    reflect();

    btn.addEventListener('click', function() {
      var current = root.getAttribute('data-theme') || 'light';
      var next = current === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      reflect();
    });
  })();

  // Shrink nav ~30% after scrolling past a small threshold; restore near top.
  (function() {
    var nav = document.getElementById('site-nav');
    var threshold = 40;

    function onScroll() {
      if (window.scrollY > threshold) {
        nav.classList.add('is-compact');
      } else {
        nav.classList.remove('is-compact');
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  })();
</script>
