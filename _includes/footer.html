<footer class="site-footer">
  <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}.
    {% if site.github %}<a href="https://github.com/{{ site.github }}" target="_blank" rel="noopener">GitHub</a>{% endif %}
