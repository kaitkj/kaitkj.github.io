---
layout: default
---
<article class="article">

  <header class="article__header">
    <h1>{{ page.title }}</h1>
    <p class="article__meta">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.tags %}
        &middot; 
        {% for tag in page.tags %}
          <a href="{{ '/tags/' | relative_url }}#{{ tag | slugify }}" class="article__tag">
            {{ tag }}
          </a>
        {% endfor %}
      {% endif %}
    </p>
    {% if page.summary %}<p class="article__summary">{{ page.summary }}</p>{% endif %}
  </header>

  {% if page.cover_image %}
    <img class="article__cover" src="{{ page.cover_image | relative_url }}" alt="{{ page.title }} cover image">
  {% endif %}

  <div class="article__body">
    {{ content }}
  </div>

</article>
